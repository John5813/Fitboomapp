kind = "mobile"
previewPath = "/"
title = "Fitboom"
version = "1.0.0"
id = "artifacts/fitboom"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23630

[services.development]
run = "pnpm --filter @workspace/fitboom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitboom", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fitboom", "run", "serve" ]

[services.env]
PORT = "23630"
BASE_PATH = "/"
